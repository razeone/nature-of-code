<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Week 10 · Phyllotaxis</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="sketch.js" type="text/javascript"></script>
    <style>
      body { padding: 0; margin: 0; background: #06060a; color: #eaeaea; font-family: system-ui, sans-serif; }
      canvas { vertical-align: top; display: block; }
      .hud { position: fixed; left: 12px; bottom: 12px; font-size: 12px; opacity: 0.85; line-height: 1.6; }
      .hud kbd { background: #1c2230; padding: 1px 5px; border-radius: 3px; }
      .title { position: fixed; left: 12px; top: 12px; font-size: 12px; opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="title">Phyllotaxis — sunflower seed spirals from a single angle</div>
    <div class="hud">
      <kbd>Drag</kbd> to tune angle (x) and scale (y) ·
      <kbd>Space</kbd> animate ·
      <kbd>G</kbd> reset to golden angle ·
      <kbd>P</kbd> cycle palettes ·
      <kbd>S</kbd> save PNG
    </div>
  </body>
</html>
