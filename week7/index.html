<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Week 7 · Flocking</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="boid.js" type="text/javascript"></script>
    <script src="sketch.js" type="text/javascript"></script>
    <style>
      body { padding: 0; margin: 0; background: #060a10; color: #eaeaea; font-family: system-ui, sans-serif; }
      canvas { vertical-align: top; display: block; }
      .hud { position: fixed; left: 12px; bottom: 12px; font-size: 12px; opacity: 0.75; line-height: 1.5; }
      .hud kbd { background: #1c2230; padding: 1px 5px; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div class="hud">
      Move the mouse — the flock is drawn toward it.<br>
      <kbd>1</kbd>/<kbd>2</kbd>/<kbd>3</kbd> tune separation / alignment / cohesion · <kbd>R</kbd> reset · <kbd>Click</kbd> adds 15 boids
    </div>
  </body>
</html>
